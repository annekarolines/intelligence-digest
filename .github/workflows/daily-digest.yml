name: Daily Intelligence Digest

on:
  schedule:
    # Roda às 10h UTC = 7h horário de Brasília
    - cron: "0 10 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coleta de artigos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_digest.py

      - name: Commitar artigos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git diff --staged --quiet || git commit -m "digest: atualização diária $(date -u '+%Y-%m-%d')"
          git push
